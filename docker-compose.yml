services:
  app:
    build: .
    image: cocos-challenge-backend:latest
    ports:
      - '3000:3000'
    # Production runs on injected env vars (no .env file). These point the app
    # at the bundled `db` service, so `docker-compose up` is self-contained.
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY:-supersecret123}
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-localdb}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_SSL: 'false'
      PORT: 3000
      # Plain (non-colorized) logs so Loki/Grafana don't show ANSI escape codes.
      NO_COLOR: '1'
      # Log timestamps in Argentina time (UTC-3). Node's Intl/ICU resolves the
      # zone without needing OS tzdata.
      TZ: America/Argentina/Buenos_Aires
    restart: always
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_DATABASE:-localdb}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - '5432:5432'
    volumes:
      - ./db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-localdb}']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  # --- Observability (logs): Loki + Promtail + Grafana ---

  # Log store
  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yaml
    restart: always

  # Log collector: tails container stdout via the Docker socket and pushes to Loki
  promtail:
    image: grafana/promtail:latest
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: always

  # Log viewer (open http://localhost:3001, Explore → {service="app"})
  grafana:
    image: grafana/grafana:latest
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasource.yaml:ro
      - ./monitoring/dashboard-provider.yml:/etc/grafana/provisioning/dashboards/dashboard-provider.yaml:ro
      - ./monitoring/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki
    restart: always
